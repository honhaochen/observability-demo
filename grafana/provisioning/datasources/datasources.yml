apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: Prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    uid: Loki
    access: proxy
    url: http://loki:3100
    jsonData:
      # Allow "Trace to logs" from Jaeger to find logs by trace_id (from log attributes/body)
      derivedFields:
        - datasourceUid: Jaeger
          matcherRegex: '"trace_id":"([^"]+)"'
          name: TraceID
          url: "$${__value.raw}"

  - name: Jaeger
    type: jaeger
    uid: Jaeger
    access: proxy
    url: http://jaeger:16686
    jsonData:
      # Link from trace view to Loki logs for this trace
      traceToLogs:
        datasourceUid: Loki
        filterByTraceID: true
        filterBySpanID: false
        tags: []
        mapTagNamesEnabled: false
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
